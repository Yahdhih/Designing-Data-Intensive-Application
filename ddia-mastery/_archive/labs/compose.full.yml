# Stack complet DDIA — Phase 2-3 (Ch.5-11)
# ⚠️  Ressources : ~8 GB RAM si tout est lancé simultanément.
# Recommandation : ne lance que les services du jour.
#   docker compose -f labs/compose.full.yml up -d postgres kafka zookeeper

services:

  # ── Postgres avec réplication logique activée (pour Debezium CDC) ────────────
  postgres:
    image: postgres:16.3
    container_name: ddia-postgres
    environment:
      POSTGRES_USER: ddia
      POSTGRES_PASSWORD: ddia
      POSTGRES_DB: ddia
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddia -d ddia"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - ddia-net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2.5
    container_name: ddia-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ddia-net

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0.8
    container_name: ddia-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ddia
      MONGO_INITDB_ROOT_PASSWORD: ddia
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - ddia-net

  # ── ZooKeeper (pour Kafka) ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ddia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ddia-net

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ddia-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ddia-net

  # ── Debezium Connect (CDC Postgres → Kafka) ───────────────────────────────────
  debezium:
    image: debezium/connect:2.6
    container_name: ddia-debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: ddia-debezium
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ddia-net

  # ── Cassandra ─────────────────────────────────────────────────────────────────
  # ⚠️  Lance séparément — consomme ~2GB RAM seul.
  # docker compose -f labs/compose.full.yml up -d cassandra
  cassandra:
    image: cassandra:4.1.4
    container_name: ddia-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: ddia-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
    networks:
      - ddia-net

  # ── etcd ──────────────────────────────────────────────────────────────────────
  etcd:
    image: bitnami/etcd:3.5.13
    container_name: ddia-etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/bitnami/etcd
    healthcheck:
      test: ["CMD-SHELL", "etcdctl endpoint health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ddia-net

volumes:
  pg_data:
  mongo_data:
  zk_data:
  zk_log:
  kafka_data:
  cassandra_data:
  etcd_data:

networks:
  ddia-net:
    name: ddia-mastery_default
